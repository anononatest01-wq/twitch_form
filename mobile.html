<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mobile Viewer Page</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0f0f13; font-family: sans-serif; color: white; }
        /* モバイルコンテナの余白を半分に縮小 */
        .mobile-container { padding: 6px 12px; box-sizing: border-box; display: flex; flex-direction: column; gap: 6px; }
        input[type="text"] { width: 100%; height: 36px; border: 1px solid #9146FF; background: #1f1f23; color: white; padding: 0 8px; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; background: #9146FF; color: white; border: none; height: 36px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:active { background: #772ce8; }
    </style>
</head>
<body>

    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

    <div class="mobile-container">
        <input type="text" id="mobileCommentInput" placeholder="匿名コメント入力フォーム" maxlength="50">
        <button id="mobileSendBtn">送信</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzFHscGVbz-LQojG5hy-To2nQOYyjGKgvn6BV7j6GfbWLad5UFOSFBOS2k6AQ2q48_L/exec";

        document.getElementById("mobileSendBtn").addEventListener("click", function() {
            const input = document.getElementById("mobileCommentInput");
            const commentText = input.value.trim();
            if (!commentText) return;

            const dummyIP = navigator.userAgent;

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ comment: commentText, ip: dummyIP })
            });

            input.value = "";
        });
    </script>
</body>
</html>
