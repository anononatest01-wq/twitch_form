<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Twitch Anonymous Form</title>
    <style>
        body { margin: 0; padding: 5px; background: transparent; font-family: sans-serif; overflow: hidden; }
        .form-container { display: flex; gap: 5px; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 5px; border: 1px solid #9146FF; box-sizing: border-box; width: 100%; }
        input[type="text"] { flex-grow: 1; border: 1px solid #9146FF; background: #1f1f23; color: white; padding: 6px; border-radius: 3px; font-size: 12px; min-width: 0; }
        input[type="text"]::placeholder { color: #adadb8; }
        button { background: #9146FF; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; white-space: nowrap; }
        button:hover { background: #772ce8; }
    </style>
</head>
<body>

<div class="form-container">
    <input type="text" id="commentInput" placeholder="匿名コメント入力フォーム" maxlength="50">
    <button onclick="sendComment()">送信</button>
</div>

<script>
    // ★ここにSTEP 2で保存したあなた自身の「GASのウェブアプリURL」を貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzFHscGVbz-LQojG5hy-To2nQOYyjGKgvn6BV7j6GfbWLad5UFOSFBOS2k6AQ2q48_L/exec";

    function sendComment() {
        const input = document.getElementById("commentInput");
        const commentText = input.value.trim();
        if (!commentText) return;

        // セキュリティブロックを完全に回避するため、外部APIとの通信をパージ（排除）
        // 代わりにブラウザの標準情報（userAgent）を仮IDの種としてGASに送る安全な仕様に変更
        const dummyIP = navigator.userAgent;

        // GASへデータを送信（CORSエラーを回避する完全な仕様）
        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "text/plain"
            },
            body: JSON.stringify({ comment: commentText, ip: dummyIP })
        });

        input.value = ""; // 入力欄をクリア
    }
</script>
</body>
</html>
